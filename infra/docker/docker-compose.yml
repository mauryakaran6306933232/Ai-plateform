version: "3.9"

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: ai-platform-postgres
    environment:
      POSTGRES_USER: aiplatform
      POSTGRES_PASSWORD: aiplatform_secret
      POSTGRES_DB: aiplatform
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aiplatform"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: ai-platform-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ChromaDB Vector Store
  chromadb:
    image: chromadb/chroma:latest
    container_name: ai-platform-chromadb
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - ANONYMIZED_TELEMETRY=FALSE
      - ALLOW_RESET=TRUE

  # FastAPI Backend
  backend:
    build:
      context: ../../apps/backend
      dockerfile: Dockerfile
    container_name: ai-platform-backend
    ports:
      - "8000:8000"
    environment:
      - APP_NAME=AI-Platform
      - APP_ENV=production
      - FRONTEND_URL=http://localhost
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=aiplatform
      - POSTGRES_PASSWORD=aiplatform_secret
      - POSTGRES_DB=aiplatform
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000 # Internal docker port is 8000
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - JWT_SECRET=change-this-to-a-real-secret-in-production
      - JWT_ALGORITHM=HS256
      - JWT_EXPIRY_MINUTES=1440
      - GITHUB_TOKEN=${GITHUB_TOKEN:-} # Passes token from host env or leaves blank
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      chromadb:
        condition: service_started
    volumes:
      - ../../workspace:/app/workspace
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # React Frontend (Nginx)
  frontend:
    build:
      context: ../../apps/frontend
      dockerfile: Dockerfile
    container_name: ai-platform-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  chroma_data: